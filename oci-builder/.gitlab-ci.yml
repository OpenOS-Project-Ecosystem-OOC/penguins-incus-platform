default:
  image: rust:latest

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_INCREMENTAL: "0"

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .cargo/registry/
    - .cargo/git/
    - incus-oci-builder/target/

stages:
  - secret-scan
  - check
  - test
  - integration

# ── Static checks ─────────────────────────────────────────────────────────────

fmt:
  stage: check
  script:
    - rustup component add rustfmt
    - cargo fmt --manifest-path incus-oci-builder/Cargo.toml -- --check

clippy:
  stage: check
  script:
    - rustup component add clippy
    - cargo clippy --manifest-path incus-oci-builder/Cargo.toml -- -D warnings

# ── Unit + doc tests ──────────────────────────────────────────────────────────

build:
  stage: test
  script:
    - cargo build --manifest-path incus-oci-builder/Cargo.toml

unit-test:
  stage: test
  script:
    - cargo test --manifest-path incus-oci-builder/Cargo.toml --test unit_oci --test unit_export --test unit_http_downloader --test unit_preflight
    - cargo test --manifest-path incus-oci-builder/Cargo.toml --lib

# ── Integration tests (requires privileged runner with Incus installed) ───────
#
# To enable: add a GitLab runner with the `incus` tag, configured as
# privileged with Incus installed and running. Then uncomment this job.
#
# integration-test:
#   stage: integration
#   tags:
#     - incus
#   variables:
#     INCUS_INTEGRATION_TESTS: "1"
#   before_script:
#     - incus admin init --auto
#     - incus remote add images https://images.linuxcontainers.org --protocol=simplestreams --public
#   script:
#     - cargo test --manifest-path incus-oci-builder/Cargo.toml --test integration_build -- --nocapture
#   after_script:
#     - incus list
#   allow_failure: false

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
